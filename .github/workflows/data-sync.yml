name: Data Sync Pipeline

on:
  schedule:
    # 每周日晚上 22:00 (北京时间下周一清晨 6:00) 运行一次
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to crawl'
        required: true
        default: '2025'

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Install Playwright Browsers & System Dependencies
        run: |
          uv run playwright install chromium --with-deps

      - name: Run Crawler & Import Data
        env:
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: |
          # 确定爬取的年份（手动触发或默认 2025）
          YEAR=${{ github.event.inputs.year || '2025' }}
          echo "开始爬取 ${YEAR} 年数据..."
          uv run python scripts/data_manager.py crawl --year $YEAR
          
          echo "导入爬取的数据到本地 DuckDB 数据库中..."
          uv run python scripts/data_manager.py import --year $YEAR

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 将变更添加到暂存区
          git add data/
          
          # 检查是否有数据文件或 DuckDB 数据库更新
          if git diff --staged --quiet; then
            echo "无数据更新，跳过推送。"
          else
            echo "检测到数据更新，正在提交并推送到 GitHub 仓库..."
            git commit -m "data: 自动更新爬取数据与数据库 [skip ci]"
            git push origin main
          fi
